<!DOCTYPE html>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:120px;
}

.header h1{
  font-size:50px;
  background:linear-gradient(45deg,#38bdf8,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:40px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  aspect-ratio:1/1; /* Instagram square */
  cursor:pointer;
  background:#111;
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
}

/* HOVER EFFECT */
.card:hover img{
  transform:scale(1.1);
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:linear-gradient(transparent,rgba(0,0,0,0.8));
  opacity:0;
  transition:0.4s;
}

.card:hover .overlay{
  opacity:1;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#cbd5e1;
}

/* MOBILE */
@media(max-width:600px){
  .header h1{
    font-size:32px;
  }
}
</style>
</head>
