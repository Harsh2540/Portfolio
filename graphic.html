<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 10px;
  font-size:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:100px;
}

.header h1{
  font-size:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:30px;
}

/* CARD */
.card{
  cursor:pointer;
  overflow:hidden;
  border-radius:12px;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.1);
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.active{
  opacity:1;
  pointer-events:auto;
}

.popup img{
  max-height:80%;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}
</style>
</head>

<body>

<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="graphic.html"><i class="fas fa-palette"></i></a>
  </div>
</header>

<div class="header">
  <h1>My Graphic Work</h1>
</div>

<div class="grid">

  <div class="card" onclick="openImg('1.png')"><img src="1.png"></div>
  <div class="card" onclick="openImg('2.png')"><img src="2.png"></div>
  <div class="card" onclick="openImg('3.png')"><img src="3.png"></div>
  <div class="card" onclick="openImg('4.png')"><img src="4.png"></div>
  <div class="card" onclick="openImg('5.png')"><img src="5.png"></div>
  <div class="card" onclick="openImg('6.png')"><img src="6.png"></div>
  <div class="card" onclick="openImg('7.png')"><img src="7.png"></div>
  <div class="card" onclick="openImg('8.png')"><img src="8.png"></div>
  <div class="card" onclick="openImg('9.png')"><img src="9.png"></div>
  <div class="card" onclick="openImg('10.png')"><img src="10.png"></div>
  <div class="card" onclick="openImg('11.png')"><img src="11.png"></div>
  <div class="card" onclick="openImg('12.png')"><img src="12.png"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeImg()">
  <img id="popupImg">
</div>

<script>
function openImg(src){
  document.getElementById("popup").classList.add("active");
  document.getElementById("popupImg").src = src;
}

function closeImg(){
  document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
