<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics | Harsh</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 15px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:120px;
}

.header h1{
  font-size:50px;
  background:linear-gradient(45deg,#38bdf8,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:40px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  aspect-ratio:1/1;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

/* ================= POPUP ================= */

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:2000;
}

.popup.active{
  opacity:1;
  pointer-events:auto;
}

.popup img{
  max-width:90%;
  max-height:90%;
  border-radius:15px;
}

/* CLOSE BUTTON */
.close{
  position:absolute;
  top:30px;
  right:40px;
  font-size:30px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#cbd5e1;
}

/* MOBILE */
@media(max-width:600px){
  .header h1{
    font-size:32px;
  }

  .navbar{
    padding:15px 20px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="#"><i class="fas fa-palette"></i></a>
  </div>
</header>

<!-- TITLE -->
<div class="header">
  <h1>My Graphic Work</h1>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card"><img src="1.png"></div>
  <div class="card"><img src="2.png"></div>
  <div class="card"><img src="3.png"></div>
  <div class="card"><img src="4.png"></div>
  <div class="card"><img src="5.png"></div>
  <div class="card"><img src="6.png"></div>
  <div class="card"><img src="7.png"></div>
  <div class="card"><img src="8.png"></div>
  <div class="card"><img src="9.png"></div>
  <div class="card"><img src="10.png"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="closePopup()">&times;</span>
  <img id="popupImg">
</div>

<!-- FOOTER -->
<footer>
  Email: prajapatisb78@gmail.com | Phone: 9328193601
</footer>

<script>

// GET ELEMENTS
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");

// CLICK IMAGE
document.querySelectorAll(".card img").forEach(img => {
  img.onclick = () => {
    popup.classList.add("active");
    popupImg.src = img.src;
  }
});

// CLOSE
function closePopup(){
  popup.classList.remove("active");
}

// CLICK OUTSIDE CLOSE
popup.onclick = (e) => {
  if(e.target === popup){
    closePopup();
  }
};

</script>

</body>
</html>
