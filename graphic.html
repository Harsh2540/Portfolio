<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 8px;
  font-size:18px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:90px;
}

.header h1{
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  cursor:pointer;
  overflow:hidden;
  border-radius:15px;
  position:relative;
}

/* IMAGE */
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:0.4s;
}

/* 🔥 DARK OVERLAY */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
  opacity:0;
  transition:0.3s;
}

/* CENTER TEXT */
.click-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:16px;
  font-weight:600;
  letter-spacing:1px;
  color:#fff;
  opacity:0;
  transition:0.3s;
  text-shadow:0 0 10px rgba(0,0,0,0.8);
}

/* HOVER EFFECT (PC) */
.card:hover::before{
  opacity:1;
}

.card:hover .click-text{
  opacity:1;
}

.card:hover img{
  transform:scale(1.1);
  filter:brightness(0.7);
}

/* MOBILE ALWAYS SHOW */
@media(max-width:600px){
  .click-text{
    opacity:1;
  }
  .card::before{
    opacity:1;
  }
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:9999;
}

.popup.active{
  opacity:1;
  pointer-events:auto;
}

.popup img{
  max-width:90%;
  max-height:90%;
  border-radius:15px;
  box-shadow:0 0 40px rgba(56,189,248,0.4);
  animation:zoom 0.4s ease;
}

@keyframes zoom{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* RESPONSIVE */
@media(max-width:1024px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .header h1{font-size:24px;}
}
</style>
</head>

<body>

<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="graphic.html"><i class="fas fa-palette"></i></a>
  </div>
</header>

<div class="header">
  <h1>My Graphic Work</h1>
</div>

<!-- GRID -->
<div class="grid">

  <!-- COPY SAME -->
  <div class="card" onclick="openImg('1.png')">
    <img src="1.png">
    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('2.png')">

    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('3.png')">
    <img src="3.png">
    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('4.png')">
    <img src="4.png">
    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('5.png')">
    <img src="5.png">
    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('6.png')">
    <img src="6.png">
    <div class="click-text">Click Here</div>
  </div>

  <div class="card" onclick="openImg('7.png')">
    <img src="7.png">

  </div>

  <div class="card" onclick="openImg('8.png')">

  </div>

  <div class="card" onclick="openImg('9.png')">

  </div>

  <div class="card" onclick="openImg('10.png')">

  </div>

  

</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeImg()">
  <img id="popupImg">
</div>

<script>
function openImg(src){
  document.getElementById("popup").classList.add("active");
  document.getElementById("popupImg").src = src;
}

function closeImg(){
  document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
