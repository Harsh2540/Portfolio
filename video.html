  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Work</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

  body{
    background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
    color:white;
  }

  /* NAVBAR */
  .navbar{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    z-index:1000;
  }

  /* HEADER */
  .header{
    text-align:center;
    margin-top:90px;
  }

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
  }

  .grid video{
    width:100%;
    aspect-ratio:9/16;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
  }

  /* POPUP */
  .reel-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    z-index:9999;

    /* 🔥 THEME BG */
    background: linear-gradient(135deg,#0f172a,#020617,#4c1d95);
  }

  /* SCROLL */
  .reel-container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
  }

  /* EACH VIDEO */
  .reel-box{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    scroll-snap-align:start;
    scroll-snap-stop:always;
  }

  /* VIDEO */
  .reel{
    max-height:85vh;
    max-width:90vw;
    aspect-ratio:9/16;
    object-fit:contain;
    border-radius:16px;

    border:4px solid transparent;
    background:
      linear-gradient(black,black) padding-box,
      linear-gradient(270deg,red,orange,yellow,green,cyan,blue,violet) border-box;

    background-size:300% 300%;
    animation:borderMove 6s linear infinite;
  }

  /* BORDER ANIMATION */
  @keyframes borderMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
  }

  /* MOBILE */
  @media(max-width:600px){
    .grid{grid-template-columns:1fr;}
  }
  </style>
  </head>

  <body>

  <header class="navbar">
    <h3>Harsh</h3>
  </header>

  <div class="header">
    <h1 style="font-size:28px;">My Video Work</h1>
  </div>

  <!-- GRID -->
  <div class="grid">
    <video src="111.mp4" onclick="openVideo(0)"></video>
    <video src="Reel .mp4" onclick="openVideo(1)"></video>
    <video src="Reel .mp4" onclick="openVideo(2)"></video>
    <video src="Reel 4.mp4" onclick="openVideo(3)"></video>
    <video src="Reel 5.mp4" onclick="openVideo(4)"></video>
    <video src="Reel 6.mp4" onclick="openVideo(5)"></video>
    <video src="Reel 7.mp4" onclick="openVideo(6)"></video>
    <video src="Reel 8.mp4" onclick="openVideo(7)"></video>
    <video src="Reel 9.mp4" onclick="openVideo(8)"></video>
    <video src="Reel 10.mp4" onclick="openVideo(9)"></video>
    <video src="Reel 11.mp4" onclick="openVideo(10)"></video>
    <video src="Reel 12.mp4" onclick="openVideo(11)"></video>
    <video src="Reel 13.mp4" onclick="openVideo(12)"></video>
    <video src="Reel 14.mp4" onclick="openVideo(13)"></video>
  </div>

  <!-- POPUP -->
  <div class="reel-popup" id="popup">
    <div class="reel-container" id="container">

      <div class="reel-box"><video class="reel" src="111.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 2.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 3.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 4.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 5.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 6.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 7.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 8.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 9.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 10.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 11.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 12.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 13.mp4" playsinline></video></div>
      <div class="reel-box"><video class="reel" src="Reel 14.mp4" playsinline></video></div>
    
    </div>
  </div>

  <script>
  const popup = document.getElementById("popup");
  const reels = document.querySelectorAll(".reel");
  const container = document.getElementById("container");

  /* OPEN */
  function openVideo(index){
    popup.style.display = "block";

    // 🔥 browser back handle
    history.pushState({popup:true}, "");

    setTimeout(()=>{
      container.scrollTop = index * window.innerHeight;
    },50);
  }

  /* 🔥 TAP = PLAY / PAUSE */
  reels.forEach(video=>{
    video.addEventListener("click",(e)=>{
      e.stopPropagation();

      if(video.paused){
        video.play();
      }else{
        video.pause();
      }
    });
  });

  /* AUTOPLAY */
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const video = entry.target;

      if(entry.isIntersecting){
        video.currentTime = 0;
        video.play();
      } else {
        video.pause();
      }
    });
  },{ threshold:0.9 });

  reels.forEach(video=>observer.observe(video));

  /* CLOSE FUNCTION */
  function closePopup(){
    popup.style.display = "none";
    reels.forEach(v=>v.pause());
  }

  /* DOUBLE TAP CLOSE */
  popup.addEventListener("dblclick",closePopup);

  /* 🔥 BACK BUTTON FIX */
  window.addEventListener("popstate",(e)=>{
    if(popup.style.display === "block"){
      closePopup();
    }
  });
  </script>

  </body>
  </html>
