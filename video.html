<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 8px;
  font-size:18px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:90px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.card video{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* 🔥 REEL POPUP */
.reel-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  z-index:9999;
}

/* SCROLL */
.reel-container{
  height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* EACH VIDEO FULL SCREEN CENTER */
.reel-box{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
}

/* VIDEO SIZE FIXED 9:16 */
.reel{
  height:90vh;
  aspect-ratio:9/16;
  max-width:100%;
  object-fit:cover;
  border-radius:12px;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:400px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="graphic.html"><i class="fas fa-palette"></i></a>
  </div>
</header>

<div class="header">
  <h1 style="font-size:28px;">My Video Work</h1>
</div>

<!-- GRID -->
<div class="grid">
  <video src="Reel 1.mp4" onclick="openVideo(0)"></video>
  <video src="Reel 2.mp4" onclick="openVideo(1)"></video>
  <video src="Reel 3.mp4" onclick="openVideo(2)"></video>
  <video src="Reel 4.mp4" onclick="openVideo(3)"></video>
  <video src="Reel 5.mp4" onclick="openVideo(4)"></video>
  <video src="Reel 6.mp4" onclick="openVideo(5)"></video>
  <video src="Reel 7.mp4" onclick="openVideo(6)"></video>
  <video src="Reel 8.mp4" onclick="openVideo(7)"></video>
  <video src="Reel 9.mp4" onclick="openVideo(8)"></video>
  <video src="Reel 10.mp4" onclick="openVideo(9)"></video>
  <video src="Reel 11.mp4" onclick="openVideo(10)"></video>
  <video src="Reel 12.mp4" onclick="openVideo(11)"></video>
  <video src="Reel 13.mp4" onclick="openVideo(12)"></video>
  <video src="Reel 14.mp4" onclick="openVideo(13)"></video>
</div>

<!-- REEL POPUP -->
<div class="reel-popup" id="popup">
  <div class="reel-container">

    <div class="reel-box"><video class="reel" src="Reel 1.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 2.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 3.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 4.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 5.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 6.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 7.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 8.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 9.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 10.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 11.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 12.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 13.mp4"></video></div>
    <div class="reel-box"><video class="reel" src="Reel 14.mp4"></video></div>

  </div>
</div>

<script>
const popup = document.getElementById("popup");
const reels = document.querySelectorAll(".reel");
const container = document.querySelector(".reel-container");

/* OPEN */
function openVideo(index){
  popup.style.display = "block";

  // scroll to selected video
  container.scrollTo({
    top: index * window.innerHeight,
    behavior: "instant"
  });

  reels.forEach((v,i)=>{
    v.pause();
    if(i === index){
      v.currentTime = 0;
      v.play();
    }
  });
}

/* AUTO PLAY */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
},{ threshold:0.8 });

reels.forEach(video=>observer.observe(video));

/* CLOSE */
popup.addEventListener("dblclick",()=>{
  popup.style.display = "none";
  reels.forEach(v=>v.pause());
});
</script>

</body>
</html>
