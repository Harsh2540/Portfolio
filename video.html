<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#020617;
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(2,6,23,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

/* TITLE */
.header{
  text-align:center;
  margin-top:100px;
}

.header h1{
  font-size:40px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.video-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  padding:30px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:10px;
  border-radius:15px;
  text-align:center;
}

/* VIDEO */
video{
  width:90%;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:12px;
}

/* TABLET */
@media (max-width:1024px){
  .video-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* MOBILE (INSTAGRAM STYLE) */
@media (max-width:600px){

  .video-grid{
    grid-template-columns:1fr;
    padding:10px;
    scroll-snap-type:y mandatory;
  }

  .card{
    max-width:350px;
    margin:auto;
    scroll-snap-align:start;
  }

  video{
    width:100%;
  }
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>
