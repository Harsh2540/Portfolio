<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 8px;
  font-size:18px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:90px;
}

.header h1{
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  cursor:pointer;
}

.card video{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:12px;
  background:black;
}

/* REEL FULL SCREEN */
.reel-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  z-index:9999;
}

.reel-container{
  height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.reel{
  width:100%;
  height:100vh;
  object-fit:cover;
  scroll-snap-align:start;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .header h1{
    font-size:24px;
  }
}

@media(max-width:400px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="graphic.html"><i class="fas fa-palette"></i></a>
  </div>
</header>

<div class="header">
  <h1>My Video Work</h1>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card" onclick="openVideo(0)"><video src="Reel 1.mp4"></video></div>
  <div class="card" onclick="openVideo(1)"><video src="Reel 2.mp4"></video></div>
  <div class="card" onclick="openVideo(2)"><video src="Reel 3.mp4"></video></div>
  <div class="card" onclick="openVideo(3)"><video src="Reel 4.mp4"></video></div>
  <div class="card" onclick="openVideo(4)"><video src="Reel 5.mp4"></video></div>
  <div class="card" onclick="openVideo(5)"><video src="Reel 6.mp4"></video></div>
  <div class="card" onclick="openVideo(6)"><video src="Reel 7.mp4"></video></div>
  <div class="card" onclick="openVideo(7)"><video src="Reel 8.mp4"></video></div>
  <div class="card" onclick="openVideo(8)"><video src="Reel 9.mp4"></video></div>
  <div class="card" onclick="openVideo(9)"><video src="Reel 10.mp4"></video></div>
  <div class="card" onclick="openVideo(10)"><video src="Reel 11.mp4"></video></div>
  <div class="card" onclick="openVideo(11)"><video src="Reel 12.mp4"></video></div>
  <div class="card" onclick="openVideo(12)"><video src="Reel 13.mp4"></video></div>
  <div class="card" onclick="openVideo(13)"><video src="Reel 14.mp4"></video></div>

</div>

<!-- REEL POPUP -->
<div class="reel-popup" id="reelPopup">
  <div class="reel-container">

    <video src="Reel 1.mp4" class="reel"></video>
    <video src="Reel 2.mp4" class="reel"></video>
    <video src="Reel 3.mp4" class="reel"></video>
    <video src="Reel 4.mp4" class="reel"></video>
    <video src="Reel 5.mp4" class="reel"></video>
    <video src="Reel 6.mp4" class="reel"></video>
    <video src="Reel 7.mp4" class="reel"></video>
    <video src="Reel 8.mp4" class="reel"></video>
    <video src="Reel 9.mp4" class="reel"></video>
    <video src="Reel 10.mp4" class="reel"></video>
    <video src="Reel 11.mp4" class="reel"></video>
    <video src="Reel 12.mp4" class="reel"></video>
    <video src="Reel 13.mp4" class="reel"></video>
    <video src="Reel 14.mp4" class="reel"></video>

  </div>
</div>

<script>
const popup = document.getElementById("reelPopup");
const reels = document.querySelectorAll(".reel");

/* OPEN VIDEO */
function openVideo(index){
  popup.style.display = "block";

  reels.forEach((video,i)=>{
    video.pause();
    if(i === index){
      video.currentTime = 0;
      video.play();
    }
  });
}

/* AUTO PLAY ON SCROLL */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
},{ threshold:0.7 });

reels.forEach(video=>{
  observer.observe(video);
});

/* DOUBLE TAP CLOSE */
popup.addEventListener("dblclick",()=>{
  popup.style.display = "none";
  reels.forEach(v=>v.pause());
});
</script>

</body>
</html>
