<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#1e3a8a,#020617,#6d28d9);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.navbar h3{
  font-size:18px;
}

.navbar a{
  color:white;
  margin:0 8px;
  font-size:18px;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:90px;
}

.header h1{
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  cursor:pointer;
}

.card video{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:12px;
  background:black;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.active{
  opacity:1;
  pointer-events:auto;
}

.popup video{
  height:80%;
  max-width:90%;
  border-radius:10px;
}

/* 🔥 RESPONSIVE */

/* Tablet */
@media(max-width:1024px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* Mobile */
@media(max-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr); /* 👈 BEST for reels */
  }

  .header h1{
    font-size:24px;
  }
}

/* Extra Small Mobile */
@media(max-width:400px){
  .grid{
    grid-template-columns:1fr; /* 👈 single column */
  }
}
</style>
</head>

<body>

<header class="navbar">
  <h3>Harsh</h3>
  <div>
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="video.html"><i class="fas fa-video"></i></a>
    <a href="graphic.html"><i class="fas fa-palette"></i></a>
  </div>
</header>

<div class="header">
  <h1>My Video Work</h1>
</div>

<div class="grid">

  <!-- COPY SAME STRUCTURE -->
  <div class="card" onclick="openVideo('Reel 1.mp4')"><video src="Reel 1.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 2.mp4')"><video src="Reel 2.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 3.mp4')"><video src="Reel 3.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 4.mp4')"><video src="Reel 4.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 5.mp4')"><video src="Reel 5.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 6.mp4')"><video src="Reel 6.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 7.mp4')"><video src="Reel 7.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 8.mp4')"><video src="Reel 8.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 9.mp4')"><video src="Reel 9.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 10.mp4')"><video src="Reel 10.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 11.mp4')"><video src="Reel 11.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 12.mp4')"><video src="Reel 12.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 13.mp4')"><video src="Reel 13.mp4"></video></div>
  <div class="card" onclick="openVideo('Reel 14.mp4')"><video src="Reel 14.mp4"></video></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeVideo()">
  <video id="popupVideo" controls></video>
</div>

<script>
function openVideo(src){
  const popup = document.getElementById("popup");
  const video = document.getElementById("popupVideo");

  popup.classList.add("active");
  video.src = src;
  video.play();
}

function closeVideo(){
  const popup = document.getElementById("popup");
  const video = document.getElementById("popupVideo");

  popup.classList.remove("active");
  video.pause();
  video.src = "";
}
</script>

</body>
</html>
